<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{% block title %}rarylib{% endblock %}</title>
    <style>
        /* Black & White theme for e-ink displays */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            font-size: 16px;
            line-height: 1.6;
            background: white;
            color: black;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 10px;
        }

        /* Header Styles */
        .header {
            background: black;
            color: white;
            padding: 12px 0;
            margin-bottom: 15px;
            border-bottom: 3px solid black;
        }

        .header-content {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 700;
        }

        .header-info {
            font-size: 13px;
        }

        /* Form Styles */
        .search-form {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 15px;
        }

        .search-form input {
            padding: 12px;
            font-size: 16px;
            border: 2px solid black;
            width: 100%;
            background: white;
        }

        .search-form input:focus {
            outline: 3px solid black;
            outline-offset: 2px;
        }

        /* Button Styles */
        .btn {
            display: block;
            width: 100%;
            padding: 12px 16px;
            font-size: 16px;
            font-weight: 700;
            text-align: center;
            text-decoration: none;
            border: 2px solid black;
            cursor: pointer;
            background: white;
            color: black;
        }

        .btn-primary {
            background: black;
            color: white;
        }

        .btn-success {
            background: black;
            color: white;
        }

        .btn-secondary {
            background: white;
            color: black;
            border: 2px solid black;
        }

        .btn-block {
            display: block;
            width: 100%;
        }

        .btn:disabled,
        .btn-disabled {
            background: white;
            color: black;
            border: 2px dashed black;
            cursor: not-allowed;
            pointer-events: none;
        }

        /* Book Item Styles */
        .book-item {
            border: 2px solid black;
            padding: 10px;
            margin-bottom: 10px;
            background: white;
            display: flex;
            align-items: stretch;
            gap: 10px;
        }

        .book-info {
            flex: 1;
            min-width: 0;
        }

        .book-title {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 4px;
            color: black;
            word-wrap: break-word;
            line-height: 1.3;
        }

        .book-meta {
            font-size: 12px;
            color: black;
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        .book-meta span {
            border: 1px solid black;
            padding: 1px 4px;
            font-size: 11px;
        }

        .btn-download {
            width: 50px;
            min-width: 50px;
            height: auto;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            background: black;
            color: white;
            border: 2px solid black;
            text-decoration: none;
        }

        /* Pagination */
        .pagination {
            display: flex;
            gap: 8px;
            margin: 12px 0;
        }

        .pagination .btn {
            flex: 1;
            min-width: 0;
            padding: 10px 8px;
            font-size: 14px;
        }

        .page-info {
            text-align: center;
            padding: 10px;
            color: black;
            font-size: 14px;
            border: 1px solid black;
            margin: 12px 0;
        }

        /* Messages */
        .message {
            padding: 20px;
            text-align: center;
            font-size: 18px;
            color: black;
            border: 2px solid black;
        }

        .no-books {
            text-align: center;
            padding: 30px 15px;
            color: black;
            font-size: 16px;
            border: 2px dashed black;
        }

        /* Loading Spinner */
        .loading-container {
            padding: 30px;
            text-align: center;
            margin: 30px auto;
            max-width: 500px;
            border: 2px solid black;
        }

        .spinner {
            border: 4px solid white;
            border-top: 4px solid black;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            margin: 0 auto 15px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-message {
            font-size: 16px;
            color: black;
            margin-top: 12px;
        }

        /* Utility Classes */
        .mt-20 { margin-top: 15px; }
        .mb-20 { margin-bottom: 15px; }
        .text-center { text-align: center; }

        /* Section Title */
        .section-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 8px;
            border-bottom: 2px solid black;
            padding-bottom: 4px;
        }
    </style>
    {% block extra_styles %}{% endblock %}
</head>
<body>
    {% block header %}
    <div class="header">
        <div class="container">
            <div class="header-content">
                <h1>rarylib</h1>
                {% if header_info %}
                <div class="header-info">{{ header_info }}</div>
                {% endif %}
            </div>
        </div>
    </div>
    {% endblock %}

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
